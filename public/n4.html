<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JLPT N4 Trainer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:80px}
.header{background:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.header-title{font-size:18px;font-weight:800;color:#1a5276;flex:1}
.progress-bar-wrap{background:#e2e8f0;border-radius:999px;height:7px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#3498db,#2980b9);border-radius:999px;transition:width .4s ease}
.progress-text{font-size:11px;color:#718096;margin-top:3px;text-align:right}
.screen{padding:14px}
.animate-in{animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-size:16px;font-weight:700;margin-bottom:10px;color:#2d3748}
.groups-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.group-card{background:#fff;border-radius:14px;padding:14px 12px;cursor:pointer;transition:transform .12s,box-shadow .12s;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid transparent;position:relative;overflow:hidden;user-select:none}
.group-card:active{transform:scale(.96)}
.group-card.done{border-color:#68d391}
.group-card-bar{position:absolute;top:0;left:0;right:0;height:4px;border-radius:14px 14px 0 0}
.group-card-icon{font-size:26px;margin-bottom:6px;display:block}
.group-card-name{font-size:12px;font-weight:700;color:#2d3748;margin-bottom:3px;line-height:1.3}
.group-card-count{font-size:11px;color:#a0aec0}
.group-card-badge{position:absolute;top:8px;right:8px;font-size:13px}
.group-hd{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;align-items:center;gap:14px}
.group-hd-icon{font-size:40px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;border-radius:18px;flex-shrink:0}
.group-hd-name{font-size:18px;font-weight:800;color:#2d3748}
.group-hd-sub{font-size:13px;color:#718096;margin-top:2px}
.tip-card{background:#ebf5fb;border:1px solid #aed6f1;border-radius:12px;padding:12px;margin-bottom:12px;font-size:13px;line-height:1.65;color:#1a5276}
.tip-label{font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;color:#2980b9}
.tabs{display:flex;background:#fff;border-radius:12px;padding:4px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.tab{flex:1;padding:9px;text-align:center;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:#718096;transition:all .18s;border:none;background:none;font-family:inherit}
.tab.active{background:#2980b9;color:#fff}
.fc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fc{perspective:1000px;height:128px;cursor:pointer;user-select:none}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s ease}
.fc.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center}
.fc-front{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.fc-back{transform:rotateY(180deg);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.fc-kanji{font-size:24px;font-weight:800;margin-bottom:3px;line-height:1.2}
.fc-romaji{font-size:11px;color:#718096}
.fc-meaning{font-size:13px;font-weight:700;line-height:1.4}
.fc-romaji-back{font-size:10px;opacity:.85;margin-top:3px}
.fc-hint{font-size:10px;color:#a0aec0;margin-top:5px}
.fc-controls{margin-top:12px;text-align:center;display:flex;gap:8px;justify-content:center}
.quiz-wrap{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.quiz-meta{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;color:#718096}
.quiz-mini-bar{background:#e2e8f0;border-radius:999px;height:5px;overflow:hidden;margin-bottom:14px}
.quiz-mini-fill{height:100%;background:linear-gradient(90deg,#3498db,#2980b9);border-radius:999px;transition:width .3s}
.quiz-word{font-size:38px;font-weight:800;text-align:center;margin-bottom:4px;line-height:1.2}
.quiz-romaji{font-size:13px;text-align:center;color:#718096;margin-bottom:18px}
.quiz-prompt{font-size:13px;font-weight:600;text-align:center;color:#4a5568;margin-bottom:12px}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.qc{padding:13px 10px;border:2px solid #e2e8f0;border-radius:11px;cursor:pointer;font-size:13px;text-align:center;transition:all .15s;background:#fff;font-family:inherit;color:#2d3748;line-height:1.3}
.qc:hover:not([disabled]){border-color:#2980b9;background:#ebf5fb}
.qc.correct{border-color:#48bb78!important;background:#f0fff4!important;color:#276749!important}
.qc.wrong{border-color:#fc8181!important;background:#fff5f5!important;color:#c53030!important}
.qc[disabled]{cursor:default}
.quiz-result{text-align:center;padding:16px 0}
.result-score{font-size:60px;font-weight:900;color:#2980b9}
.result-pct{font-size:16px;color:#718096;margin-bottom:6px}
.result-msg{font-size:15px;font-weight:600;color:#2d3748;margin-bottom:20px}
.final-banner{background:linear-gradient(135deg,#3498db,#2980b9);border-radius:18px;padding:22px;text-align:center;color:#fff;margin-bottom:20px}
.final-banner h2{font-size:22px;font-weight:900;margin-bottom:6px}
.final-banner p{font-size:13px;opacity:.9}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:11px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;transition:all .15s;user-select:none}
.btn-primary{background:#2980b9;color:#fff}
.btn-primary:active{background:#1a5276}
.btn-secondary{background:#e2e8f0;color:#2d3748}
.btn-secondary:active{background:#cbd5e0}
.btn-block{width:100%}
.btn-row{display:flex;gap:9px;margin-top:14px}
.btn-row .btn{flex:1}
.btn-ghost{background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.6)}
.back-btn{display:flex;align-items:center;gap:5px;color:#2980b9;font-size:14px;font-weight:700;cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#fff;border-top:1px solid #e2e8f0;display:flex;padding:10px 14px;gap:10px;z-index:100}
.nav-bar .btn{flex:1}
.next-q-wrap{margin-top:14px;text-align:center}
.result-words{margin-top:16px;max-height:200px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:10px}
.result-word-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;font-size:12px;border-bottom:1px solid #f7fafc}
.result-word-row:last-child{border-bottom:none}
.result-word-row.miss{background:#fff5f5}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─────────────────────────────────────────────
// VOCABULARY — 55 groups, ~720 words (JLPT N4)
// word format: [kanji/kana, romaji, english]
// ─────────────────────────────────────────────
const GROUPS = [
  /* 01 */ {
    name:"Family & Relationships",icon:"👨‍👩‍👧",color:"#2980B9",
    tip:"N4 family vocab introduces in-law and extended family terms. 息子 (musuko=son) and 娘 (musume=daughter) are humble forms for your own children. 恋人 (koibito) is the neutral term for a romantic partner — boyfriend/girlfriend context determines gender.",
    words:[
      ["息子","musuko","son"],
      ["娘","musume","daughter"],
      ["夫","otto","husband"],
      ["妻","tsuma","wife"],
      ["親","oya","parent(s)"],
      ["兄弟","kyōdai","siblings (brothers)"],
      ["姉妹","shimai","sisters"],
      ["孫","mago","grandchild"],
      ["叔父","oji","uncle"],
      ["叔母","oba","aunt"],
      ["親戚","shinseki","relative"],
      ["夫婦","fūfu","married couple"],
      ["恋人","koibito","partner / lover"],
      ["独身","dokushin","single / unmarried"],
    ]
  },
  /* 02 */ {
    name:"Body Extended",icon:"🫁",color:"#8E44AD",
    tip:"N4 body words go deeper inside. 骨 (hone=bone), 血 (chi=blood) and 皮膚 (hifu=skin) are medical basics. 指 can mean finger OR toe — add 足の (ashi no) to specify toe.",
    words:[
      ["骨","hone","bone"],
      ["血","chi","blood"],
      ["皮膚","hifu","skin"],
      ["胸","mune","chest"],
      ["腹","hara","belly / stomach"],
      ["背中","senaka","back (body)"],
      ["足首","ashikubi","ankle"],
      ["爪","tsume","nail (finger/toe)"],
      ["心臓","shinzō","heart"],
      ["肺","hai","lung(s)"],
      ["胃","i","stomach (organ)"],
      ["神経","shinkei","nerve"],
      ["筋肉","kinniku","muscle"],
      ["関節","kansetsu","joint"],
    ]
  },
  /* 03 */ {
    name:"Personality & Character",icon:"🌟",color:"#16A085",
    tip:"Character adjectives often come in pairs: 真面目 (majime=diligent) vs 不真面目 (fu-majime=lazy), 正直 (shōjiki=honest) vs 不正直. Adding 不 (fu/bu) to a な-adjective usually creates the opposite.",
    words:[
      ["性格","seikaku","personality / character"],
      ["真面目","majime","serious / diligent"],
      ["正直","shōjiki","honest"],
      ["親切","shinsetsu","kind"],
      ["丁寧","teinei","polite / careful"],
      ["勇気","yūki","courage"],
      ["我慢","gaman","patience / endurance"],
      ["素直","sunao","obedient / frank"],
      ["頑固","ganko","stubborn"],
      ["積極的","sekkyokuteki","proactive / assertive"],
      ["消極的","shōkyokuteki","passive / reserved"],
      ["社交的","shakōteki","sociable"],
      ["几帳面","kichōmen","neat / meticulous"],
    ]
  },
  /* 04 */ {
    name:"Emotions & Feelings",icon:"💭",color:"#C0392B",
    tip:"Many emotion words in N4 are い-adjectives ending in しい: 恥ずかしい (hazukashii=embarrassed), 寂しい (sabishii=lonely), 羨ましい (urayamashii=envious). The しい ending is a hallmark of emotional adjectives in Japanese.",
    words:[
      ["安心","anshin","relief / peace of mind"],
      ["緊張","kinchō","nervousness / tension"],
      ["恥ずかしい","hazukashii","embarrassing / shy"],
      ["寂しい","sabishii","lonely"],
      ["羨ましい","urayamashii","envious"],
      ["もったいない","mottainai","wasteful / what a waste"],
      ["懐かしい","natsukashii","nostalgic"],
      ["悔しい","kuyashii","frustrating / regrettable"],
      ["恐ろしい","osoroshii","frightening / terrible"],
      ["困る","komaru","to be troubled / at a loss"],
      ["驚く","odoroku","to be surprised"],
      ["後悔","kōkai","regret"],
      ["満足","manzoku","satisfaction"],
    ]
  },
  /* 05 */ {
    name:"Home & Housing",icon:"🏠",color:"#1ABC9C",
    tip:"Japanese housing mixes 和室 (washitsu=Japanese room) and 洋室 (yōshitsu=Western room). 家賃 (yachin=rent) and 引越し (hikkoshi=moving house) are essential rental vocab. The entrance 玄関 is N5; 廊下 (rōka=hallway) and 階段 (kaidan=stairs) are N4.",
    words:[
      ["廊下","rōka","hallway / corridor"],
      ["押し入れ","oshiire","Japanese closet"],
      ["階段","kaidan","staircase"],
      ["屋根","yane","roof"],
      ["壁","kabe","wall"],
      ["畳","tatami","tatami mat"],
      ["和室","washitsu","Japanese-style room"],
      ["洋室","yōshitsu","Western-style room"],
      ["家賃","yachin","rent"],
      ["引越し","hikkoshi","moving house"],
      ["駐車場","chūshajō","parking lot"],
      ["管理人","kanrinin","building manager"],
      ["契約","keiyaku","contract"],
    ]
  },
  /* 06 */ {
    name:"Household Items",icon:"🧹",color:"#2C3E50",
    tip:"Many household appliance names are katakana loanwords: ストーブ (stove/heater), カーテン (curtain), エアコン. 電池 (denchi=battery) and 電球 (denkyū=light bulb) share the kanji 電 (electricity), making them easy to pair-learn.",
    words:[
      ["引き出し","hikidashi","drawer"],
      ["棚","tana","shelf"],
      ["掃除機","sōjiki","vacuum cleaner"],
      ["乾燥機","kansōki","dryer"],
      ["ストーブ","sutōbu","heater / stove"],
      ["電球","denkyū","light bulb"],
      ["カーテン","kāten","curtain"],
      ["ふとん","futon","futon / bedding"],
      ["まくら","makura","pillow"],
      ["ゴミ箱","gomibako","trash can"],
      ["電池","denchi","battery"],
      ["工具","kōgu","tool(s)"],
      ["はさみ","hasami","scissors"],
    ]
  },
  /* 07 */ {
    name:"Kitchen & Cooking",icon:"🍳",color:"#D35400",
    tip:"Japanese cooking verbs describe method precisely: 焼く (yaku=grill/bake), 煮る (niru=simmer/boil), 炒める (itameru=stir-fry), 揚げる (ageru=deep-fry), 蒸す (musu=steam). Memorise these five and you can describe almost any dish preparation.",
    words:[
      ["料理","ryōri","cooking / dish"],
      ["食事","shokuji","meal"],
      ["切る","kiru","to cut"],
      ["焼く","yaku","to grill / bake"],
      ["煮る","niru","to boil / simmer"],
      ["炒める","itameru","to stir-fry"],
      ["蒸す","musu","to steam"],
      ["揚げる","ageru","to deep-fry"],
      ["包丁","hōchō","kitchen knife"],
      ["フライパン","furaipan","frying pan"],
      ["鍋","nabe","pot"],
      ["材料","zairyō","ingredients"],
      ["レシピ","reshipi","recipe"],
      ["味","aji","taste / flavor"],
    ]
  },
  /* 08 */ {
    name:"Condiments & Ingredients",icon:"🧂",color:"#7D6608",
    tip:"Fermentation is central to Japanese flavour: 醤油 (shōyu=soy sauce) and 味噌 (miso) are both fermented. 出汁 (dashi=broth) is the umami base of most Japanese dishes — learn this kanji pair because dashi appears in countless recipes.",
    words:[
      ["醤油","shōyu","soy sauce"],
      ["味噌","miso","miso paste"],
      ["砂糖","satō","sugar"],
      ["酢","su","vinegar"],
      ["油","abura","oil"],
      ["バター","batā","butter"],
      ["小麦粉","komugiko","wheat flour"],
      ["豆腐","tōfu","tofu"],
      ["納豆","nattō","natto (fermented soybeans)"],
      ["出汁","dashi","dashi broth"],
      ["ソース","sōsu","sauce"],
      ["マヨネーズ","mayonēzu","mayonnaise"],
      ["みりん","mirin","sweet cooking sake"],
    ]
  },
  /* 09 */ {
    name:"Restaurants & Dining",icon:"🍜",color:"#117A65",
    tip:"定食 (teishoku=set meal) is a core concept: rice + main + miso soup all for a fixed price. 割り勘 (warikan=splitting the bill) is common among friends; 奢る (ogoru=to treat someone) is the opposite. Always say いただきます before eating!",
    words:[
      ["注文","chūmon","order"],
      ["定食","teishoku","set meal"],
      ["会計","kaikei","bill / check"],
      ["予約","yoyaku","reservation"],
      ["禁煙","kin'en","non-smoking"],
      ["喫煙","kituen","smoking"],
      ["席","seki","seat"],
      ["おかわり","okawari","refill / second helping"],
      ["割り勘","warikan","splitting the bill"],
      ["出前","demae","food delivery"],
      ["食べ放題","tabehōdai","all-you-can-eat"],
      ["持ち帰り","mochikaeri","takeout / to go"],
    ]
  },
  /* 10 */ {
    name:"Shopping Extended",icon:"🛍️",color:"#1F618D",
    tip:"消費税 (shōhizei=consumption tax) is added at checkout in Japan — currently 10%. 領収書 (ryōshūsho=receipt) is needed for expense claims. 返品 (henpin=return) and 交換 (kōkan=exchange) are your rights as a consumer.",
    words:[
      ["割引","waribiki","discount"],
      ["セール","sēru","sale"],
      ["定価","teika","regular price"],
      ["消費税","shōhizei","consumption tax"],
      ["領収書","ryōshūsho","receipt (formal)"],
      ["返品","henpin","product return"],
      ["交換","kōkan","exchange"],
      ["商品","shōhin","product / merchandise"],
      ["在庫","zaiko","stock / inventory"],
      ["売り場","uriba","sales floor / department"],
      ["包む","tsutsumu","to wrap"],
      ["試着","shichaku","trying on clothes"],
      ["品質","hinshitsu","quality"],
    ]
  },
  /* 11 */ {
    name:"Money & Finance",icon:"💰",color:"#1E8449",
    tip:"貯金 (chokin=savings) contains 貯 (to store) + 金 (money). 口座 (kōza=account) is used at the bank. 節約 (setsuyaku=economising) is a virtue in Japanese culture — the concept of もったいない (waste not) is deeply cultural.",
    words:[
      ["貯金","chokin","savings"],
      ["口座","kōza","bank account"],
      ["振り込み","furikomi","bank transfer"],
      ["両替","ryōgae","currency exchange"],
      ["税金","zeikin","tax"],
      ["保険","hoken","insurance"],
      ["借金","shakkin","debt"],
      ["給料","kyūryō","salary"],
      ["家計","kakei","household budget"],
      ["費用","hiyō","cost / expense"],
      ["節約","setsuyaku","economizing / saving"],
      ["値段","nedan","price"],
    ]
  },
  /* 12 */ {
    name:"Transportation Extended",icon:"🚆",color:"#2471A3",
    tip:"Japan's train system uses key terms: 急行 (kyūkō=express), 特急 (tokkyū=limited express), 各駅停車 (kakueki teisha=local). 乗り換え (norikae=transfer) is crucial when navigating. 定期券 (teikiken=commuter pass) is bought monthly.",
    words:[
      ["急行","kyūkō","express (train)"],
      ["特急","tokkyū","limited express"],
      ["各駅停車","kakueki teisha","local train (all stops)"],
      ["乗り換え","norikae","transfer / connection"],
      ["時刻表","jikokuhyō","timetable"],
      ["定期券","teikiken","commuter pass"],
      ["改札","kaisatsu","ticket gate"],
      ["ホーム","hōmu","platform"],
      ["出発","shuppatsu","departure"],
      ["到着","tōchaku","arrival"],
      ["遅延","chien","delay"],
      ["渋滞","jūtai","traffic jam"],
      ["信号","shingō","traffic light"],
      ["駐車","chūsha","parking"],
    ]
  },
  /* 13 */ {
    name:"Travel & Tourism",icon:"✈️",color:"#6C3483",
    tip:"観光 (kankō=sightseeing) is built from 観 (to observe) + 光 (light/scenery). 名所 (meisho=famous place) combines 名 (famous/name) + 所 (place). When travelling, you'll need パスポート and 予約 (yoyaku=reservation) — always book in advance in Japan!",
    words:[
      ["観光","kankō","sightseeing"],
      ["名所","meisho","famous place / attraction"],
      ["チェックイン","chekkuin","check-in"],
      ["チェックアウト","chekkuauto","check-out"],
      ["パスポート","pasupōto","passport"],
      ["ビザ","biza","visa"],
      ["海外","kaigai","overseas / abroad"],
      ["国内","kokunai","domestic / within Japan"],
      ["予約","yoyaku","reservation"],
      ["ツアー","tsuā","tour"],
      ["旅館","ryokan","traditional Japanese inn"],
      ["温泉","onsen","hot spring"],
      ["観光地","kankōchi","tourist area"],
    ]
  },
  /* 14 */ {
    name:"Weather Extended",icon:"⛈️",color:"#1A5276",
    tip:"梅雨 (tsuyu=rainy season) is written with 梅 (plum) + 雨 (rain) — plum rain, because it falls during plum season (June). 台風 (taifū=typhoon) is Japan's seasonal threat. 湿度 (shitsudo=humidity) is why Japanese summers feel so intense.",
    words:[
      ["梅雨","tsuyu","rainy season"],
      ["台風","taifū","typhoon"],
      ["雷","kaminari","thunder / lightning"],
      ["霧","kiri","fog"],
      ["霜","shimo","frost"],
      ["洪水","kōzui","flood"],
      ["湿度","shitsudo","humidity"],
      ["気温","kion","air temperature"],
      ["天気予報","tenkiyohō","weather forecast"],
      ["嵐","arashi","storm"],
      ["日差し","hizashi","sunlight / sunshine"],
      ["寒波","kanpa","cold wave"],
      ["晴れ間","harema","sunny break / clear spell"],
    ]
  },
  /* 15 */ {
    name:"Nature & Landscape",icon:"🌿",color:"#27AE60",
    tip:"Many nature kanji appear in place names: 松 (matsu=pine) in 松山, 竹 (take=bamboo) in 竹田, 梅 (ume=plum) in 梅田. Learning these kanji helps you decode Japanese geography. 地震 (jishin=earthquake) uses 地 (earth) + 震 (shake).",
    words:[
      ["梅","ume","plum (tree/blossom)"],
      ["松","matsu","pine tree"],
      ["竹","take","bamboo"],
      ["枝","eda","branch"],
      ["葉","ha","leaf"],
      ["種","tane","seed"],
      ["根","ne","root"],

// STATE
// ─────────────────────────────────────────────
const state = {
  view: 'home',
  currentGroup: 0,
  tab: 'cards',
  flipped: new Set(),
  quizState: null,
  groupProgress: {},
  finalQuiz: null,
};

function loadProgress() {
  try {
    const d = localStorage.getItem('jlpt_n4_v1');
    if (d) {
      const saved = JSON.parse(d);
      if (saved.groupProgress) {
        state.groupProgress = saved.groupProgress;
        if (saved.view) state.view = saved.view;
        if (saved.currentGroup != null) state.currentGroup = saved.currentGroup;
        if (saved.tab) state.tab = saved.tab;
      } else {
        state.groupProgress = saved;
      }
    }
  } catch(e) {}
}
function saveProgress() {
  try {
    localStorage.setItem('jlpt_n4_v1', JSON.stringify({
      groupProgress: state.groupProgress,
      view: state.view,
      currentGroup: state.currentGroup,
      tab: state.tab,
    }));
  } catch(e) {}
}

// ─────────────────────────────────────────────
// QUIZ LOGIC
// ─────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getWrongAnswers(word, pool) {
  const others = pool.filter(w => w[2] !== word[2]);
  if (others.length >= 3) return shuffle(others).slice(0, 3);
  const allWords = GROUPS.flatMap(g => g.words);
  return shuffle(allWords.filter(w => w[2] !== word[2])).slice(0, 3);
}

function buildQ(word, gi) {
  const pool = GROUPS[gi].words;
  const wrongs = getWrongAnswers(word, pool);
  const choices = shuffle([word, ...wrongs]);
  return { word, choices, correctIdx: choices.indexOf(word), answered: null };
}

function buildQuestions(wordPool, count) {
  const picked = shuffle([...wordPool]).slice(0, count);
  return picked.map(word => {
    const wrongs = getWrongAnswers(word, wordPool);
    const choices = shuffle([word, ...wrongs]);
    return { word, choices, correctIdx: choices.indexOf(word), answered: null };
  });
}

// Mastery quiz: recycle wrong answers until every word is correct
function generateQuiz(gi) {
  const words = GROUPS[gi].words;
  const roundQueue = shuffle(words.map((_,i) => i));
  return {
    groupIdx: gi, words,
    masteredIdx: new Set(),
    roundQueue, roundPos: 0, roundNum: 1,
    currentQ: buildQ(words[roundQueue[0]], gi),
    totalAsked: 0, totalCorrect: 0, done: false
  };
}

// Final quiz: 50 random questions from all groups
function generateFinalQuiz() {
  const all = GROUPS.flatMap(g => g.words);
  return { questions: buildQuestions(all, 50), current: 0, score: 0, done: false };
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function completedCount() {
  return Object.values(state.groupProgress).filter(Boolean).length;
}

function render() {
  const app = document.getElementById('app');
  if (state.view === 'home') app.innerHTML = renderHome();
  else if (state.view === 'group') app.innerHTML = renderGroup();
  else app.innerHTML = renderFinalScreen();
  attachEvents();
}

function renderHome() {
  const done = completedCount(), total = GROUPS.length;
  const pct = Math.round(done / total * 100);
  const totalWords = GROUPS.reduce((s,g) => s + g.words.length, 0);
  const cards = GROUPS.map((g, i) => {
    const isDone = state.groupProgress[i];
    return `<div class="group-card${isDone?' done':''}" data-action="open-group" data-idx="${i}">
      <div class="group-card-bar" style="background:${g.color}"></div>
      <span class="group-card-icon">${g.icon}</span>
      <div class="group-card-name">${g.name}</div>
      <div class="group-card-count">${g.words.length} words</div>
      ${isDone?'<span class="group-card-badge">✅</span>':''}
    </div>`;
  }).join('');
  const unlocked = done >= Math.ceil(total * 0.4);
  return `
  <div class="header">
    <div class="header-top">
      <span class="header-title">🎌 JLPT N4 Trainer</span>
      <span style="font-size:12px;color:#718096;font-weight:600">${pct}%</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="progress-text">${done} / ${total} groups · ${totalWords} total words</div>
  </div>
  <div class="screen animate-in">
    <div class="section-title">Choose a Group</div>
    <div class="groups-grid">${cards}</div>
    <div style="margin-top:20px">
      <div class="final-banner" style="${!unlocked?'opacity:.55':''}">
        <h2>🏆 Final Review Quiz</h2>
        <p>${unlocked?'50 questions from ALL groups — test your N4 mastery!':'Complete '+Math.ceil(total*.4)+' groups to unlock'}</p>
        ${unlocked?`<button class="btn btn-ghost" style="margin-top:12px" data-action="open-final">Start Final Quiz →</button>`:''}
      </div>
    </div>
  </div>`;
}

function renderGroup() {
  const gi = state.currentGroup, g = GROUPS[gi];
  const isDone = state.groupProgress[gi];
  return `
  <div class="header">
    <div class="header-top">
      <button class="back-btn" data-action="go-home">← Groups</button>
      <span style="flex:1;text-align:center;font-size:12px;color:#718096;font-weight:600">${gi+1} / ${GROUPS.length}</span>
      <div style="width:80px"></div>
    </div>
  </div>
  <div class="screen animate-in">
    <div class="group-hd">
      <div class="group-hd-icon" style="background:${g.color}22">${g.icon}</div>
      <div>
        <div class="group-hd-name">${g.name}</div>
        <div class="group-hd-sub">${g.words.length} words${isDone?' · ✅ Completed':''}</div>
      </div>
    </div>
    <div class="tip-card">
      <div class="tip-label">💡 Memory Tip</div>
      ${g.tip}
    </div>
    <div class="tabs">
      <button class="tab${state.tab==='cards'?' active':''}" data-action="set-tab" data-tab="cards">🃏 Flashcards</button>
      <button class="tab${state.tab==='quiz'?' active':''}" data-action="set-tab" data-tab="quiz">📝 Mastery Quiz</button>
    </div>
    ${state.tab==='cards' ? renderFlashcards(gi, g) : renderQuiz(gi, g)}
  </div>
  <div class="nav-bar">
    <button class="btn btn-secondary" data-action="prev-group" ${gi===0?'disabled':''}>← Prev</button>
    <button class="btn btn-primary" data-action="next-group" ${gi===GROUPS.length-1?'disabled':''}>Next →</button>
  </div>`;
}

function renderFlashcards(gi, g) {
  const cards = g.words.map((w, i) => {
    const key = `${gi}-${i}`, flip = state.flipped.has(key);
    return `<div class="fc${flip?' flipped':''}" data-action="flip" data-key="${key}">
      <div class="fc-inner">
        <div class="fc-front">
          <div class="fc-kanji">${w[0]}</div>
          <div class="fc-romaji">${w[1]}</div>
          <div class="fc-hint">tap to reveal</div>
        </div>
        <div class="fc-back" style="background:${g.color}">
          <div class="fc-meaning">${w[2]}</div>
          <div class="fc-romaji-back">${w[1]}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  const allFlip = g.words.every((_,i) => state.flipped.has(`${gi}-${i}`));
  const flippedCount = g.words.filter((_,i) => state.flipped.has(`${gi}-${i}`)).length;
  return `
    <div style="font-size:12px;color:#718096;margin-bottom:8px;text-align:right">${flippedCount}/${g.words.length} revealed</div>
    <div class="fc-grid">${cards}</div>
    <div class="fc-controls">
      <button class="btn btn-secondary" style="font-size:13px" data-action="flip-all">${allFlip?'↺ Reset':'👁 Reveal All'}</button>
      <button class="btn btn-primary" style="font-size:13px" data-action="set-tab" data-tab="quiz">Quiz All ${g.words.length} →</button>
    </div>`;
}

function renderQuiz(gi, g) {
  const qs = state.quizState;
  if (!qs || qs.groupIdx !== gi) {
    return `<div class="quiz-wrap" style="text-align:center">
      <div style="font-size:48px;margin-bottom:12px">📝</div>
      <p style="color:#4a5568;margin-bottom:6px;font-size:14px"><strong>Mastery Quiz</strong> — ${g.words.length} words in ${g.name}.</p>
      <p style="color:#718096;margin-bottom:18px;font-size:13px">Wrong answers come back. Quiz ends only when every word is correct.</p>
      <button class="btn btn-primary btn-block" data-action="start-quiz">Start Mastery Quiz</button>
    </div>`;
  }
  if (qs.done) return renderQuizResult(qs, g);
  const q = qs.currentQ;
  const masteredPct = Math.round(qs.masteredIdx.size / qs.words.length * 100);
  const cbs = q.choices.map((c,i) => {
    let cls = 'qc', dis = '';
    if (q.answered !== null) {
      dis = 'disabled';
      if (i === q.correctIdx) cls += ' correct';
      else if (i === q.answered) cls += ' wrong';
    }
    return `<button class="${cls}" data-action="answer" data-idx="${i}" ${dis}>${c[2]}</button>`;
  }).join('');
  return `<div class="quiz-wrap">
    <div class="quiz-meta">
      <span>Round ${qs.roundNum} · ${qs.roundPos+1}/${qs.roundQueue.length}</span>
      <span>✅ ${qs.masteredIdx.size}/${qs.words.length} mastered</span>
    </div>
    <div class="quiz-mini-bar"><div class="quiz-mini-fill" style="width:${masteredPct}%"></div></div>
    <div class="quiz-word">${q.word[0]}</div>
    <div class="quiz-romaji">${q.word[1]}</div>
    <div class="quiz-prompt">What does this mean?</div>
    <div class="quiz-choices">${cbs}</div>
  </div>`;
}

function renderQuizResult(qs, g) {
  const acc = qs.totalAsked ? Math.round(qs.totalCorrect / qs.totalAsked * 100) : 100;
  const msg = qs.roundNum === 1 ? '🎉 Perfect — first try on every word!' : qs.roundNum === 2 ? '🌟 Excellent — mastered in 2 rounds!' : `👍 Mastered in ${qs.roundNum} rounds!`;
  return `<div class="quiz-wrap">
    <div class="quiz-result">
      <div style="font-size:40px;margin-bottom:6px">🎉</div>
      <div class="result-score">${qs.words.length}/${qs.words.length}</div>
      <div class="result-pct">All words mastered · ${acc}% accuracy</div>
      <div class="result-msg">${msg}</div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn btn-secondary" data-action="retry-quiz">↺ Retry</button>
      </div>
    </div>
  </div>`;
}

// ── FINAL QUIZ ────────────────────────────────
function renderFinalScreen() {
  const hdr = `<div class="header">
    <div class="header-top">
      <button class="back-btn" data-action="go-home">← Back</button>
      <span style="flex:1;text-align:center;font-weight:800;color:#1a5276">🏆 Final Quiz</span>
      <div style="width:80px"></div>
    </div>
  </div>`;
  if (!state.finalQuiz) {
    return `${hdr}<div class="screen animate-in">
      <div class="final-banner">
        <h2>🏆 Final Review Quiz</h2>
        <p>50 questions drawn randomly from all ${GROUPS.length} groups. Good luck!</p>
      </div>
      <button class="btn btn-primary btn-block" data-action="start-final-now">Start Quiz (50 questions)</button>
    </div>`;
  }
  const fq = state.finalQuiz;
  if (fq.done) {
    const s = fq.score, t = fq.questions.length, p = Math.round(s/t*100);
    const msg = p>=90?'🎉 Master level!':p>=70?'🌟 Excellent!':p>=50?'👍 Good work!':'📚 Keep studying!';
    return `${hdr}<div class="screen animate-in">
      <div class="quiz-wrap">
        <div class="quiz-result">
          <div style="font-size:18px;font-weight:800;margin-bottom:8px">Final Results</div>
          <div class="result-score">${s}/${t}</div>
          <div class="result-pct">${p}%</div>
          <div class="result-msg">${msg}</div>
          <div class="btn-row">
            <button class="btn btn-secondary" data-action="go-home">🏠 Home</button>
            <button class="btn btn-primary" data-action="restart-final">↺ Retry</button>
          </div>
        </div>
      </div>
    </div>`;
  }
  const q = fq.questions[fq.current];
  const pct = Math.round(fq.current / fq.questions.length * 100);
  const cbs = q.choices.map((c,i) => {
    let cls = 'qc', dis = '';
    if (q.answered !== null) {
      dis = 'disabled';
      if (i === q.correctIdx) cls += ' correct';
      else if (i === q.answered) cls += ' wrong';
    }
    return `<button class="${cls}" data-action="answer-final" data-idx="${i}" ${dis}>${c[2]}</button>`;
  }).join('');
  return `${hdr}<div class="screen animate-in">
    <div class="quiz-wrap">
      <div class="quiz-meta">
        <span>Q${fq.current+1} / ${fq.questions.length}</span>
        <span>✅ ${fq.score} &nbsp;❌ ${fq.current - fq.score}</span>
      </div>
      <div class="quiz-mini-bar"><div class="quiz-mini-fill" style="width:${pct}%"></div></div>
      <div class="quiz-word">${q.word[0]}</div>
      <div class="quiz-romaji">${q.word[1]}</div>
      <div class="quiz-prompt">What does this mean?</div>
      <div class="quiz-choices">${cbs}</div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────
let _autoTimer = null;
function scheduleAdvance(action) {
  clearTimeout(_autoTimer);
  _autoTimer = setTimeout(() => { handleClick({ currentTarget: { dataset: { action } } }); }, 1200);
}

function attachEvents() {
  document.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', handleClick));
}

function handleClick(e) {
  const a = e.currentTarget.dataset.action;
  if (a === 'open-group') {
    state.currentGroup = +e.currentTarget.dataset.idx;
    state.view = 'group'; state.tab = 'cards';
    state.flipped = new Set(); state.quizState = null;
    saveProgress(); render(); scrollTo(0,0);
  } else if (a === 'go-home') {
    state.view = 'home'; saveProgress(); render(); scrollTo(0,0);
  } else if (a === 'set-tab') {
    state.tab = e.currentTarget.dataset.tab; saveProgress(); render();
  } else if (a === 'flip') {
    const k = e.currentTarget.dataset.key;
    state.flipped.has(k) ? state.flipped.delete(k) : state.flipped.add(k);
    e.currentTarget.classList.toggle('flipped');
    const gi = state.currentGroup, g = GROUPS[gi];
    const cnt = g.words.filter((_,i) => state.flipped.has(`${gi}-${i}`)).length;
    const el = document.querySelector('.fc-grid').previousElementSibling;
    if (el) el.textContent = `${cnt}/${g.words.length} revealed`;
    const allF = cnt === g.words.length;
    const btn = document.querySelector('[data-action="flip-all"]');
    if (btn) btn.textContent = allF ? '↺ Reset' : '👁 Reveal All';
  } else if (a === 'flip-all') {
    const gi = state.currentGroup, g = GROUPS[gi];
    const allF = g.words.every((_,i) => state.flipped.has(`${gi}-${i}`));
    g.words.forEach((_,i) => allF ? state.flipped.delete(`${gi}-${i}`) : state.flipped.add(`${gi}-${i}`));
    render();
  } else if (a === 'start-quiz') {
    clearTimeout(_autoTimer); state.quizState = generateQuiz(state.currentGroup); render();
  } else if (a === 'retry-quiz') {
    clearTimeout(_autoTimer); state.quizState = null; render();
  } else if (a === 'answer') {
    const qs = state.quizState;
    if (!qs || qs.done) return;
    const q = qs.currentQ;
    if (q.answered !== null) return;
    const idx = +e.currentTarget.dataset.idx;
    q.answered = idx;
    qs.totalAsked++;
    if (idx === q.correctIdx) { qs.totalCorrect++; qs.masteredIdx.add(qs.roundQueue[qs.roundPos]); }
    render();
    scheduleAdvance('next-q');
  } else if (a === 'next-q') {
    clearTimeout(_autoTimer);
    const qs = state.quizState;
    qs.roundPos++;
    if (qs.roundPos >= qs.roundQueue.length) {
      const unmastered = qs.words.map((_,i) => i).filter(i => !qs.masteredIdx.has(i));
      if (unmastered.length === 0) {
        qs.done = true;
        state.groupProgress[state.currentGroup] = true; saveProgress();
      } else {
        qs.roundQueue = shuffle(unmastered);
        qs.roundPos = 0; qs.roundNum++;
        qs.currentQ = buildQ(qs.words[qs.roundQueue[0]], qs.groupIdx);
      }
    } else {
      qs.currentQ = buildQ(qs.words[qs.roundQueue[qs.roundPos]], qs.groupIdx);
    }
    render();
  } else if (a === 'prev-group') {
    if (state.currentGroup > 0) { state.currentGroup--; state.tab='cards'; state.flipped=new Set(); state.quizState=null; saveProgress(); render(); scrollTo(0,0); }
  } else if (a === 'next-group') {
    if (state.currentGroup < GROUPS.length-1) { state.currentGroup++; state.tab='cards'; state.flipped=new Set(); state.quizState=null; saveProgress(); render(); scrollTo(0,0); }
  } else if (a === 'open-final') {
    state.view = 'final'; state.finalQuiz = null; saveProgress(); render(); scrollTo(0,0);
  } else if (a === 'start-final-now') {
    state.finalQuiz = generateFinalQuiz(); render();
  } else if (a === 'answer-final') {
    const fq = state.finalQuiz;
    if (!fq || fq.done) return;
    const q = fq.questions[fq.current];
    if (q.answered !== null) return;
    const idx = +e.currentTarget.dataset.idx;
    q.answered = idx;
    if (idx === q.correctIdx) fq.score++;
    render();
    scheduleAdvance('next-final');
  } else if (a === 'next-final') {
    clearTimeout(_autoTimer);
    state.finalQuiz.current++;
    if (state.finalQuiz.current >= state.finalQuiz.questions.length) state.finalQuiz.done = true;
    render();
  } else if (a === 'restart-final') {
    state.finalQuiz = null; render();
  }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadProgress();
render();
</script>
</body>
</html>
