<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JLPT N5 Trainer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--surface3:#e5e5ea;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.13);
  --text:#1c1c1e;--text2:#48484a;--text3:#8e8e93;--text4:#aeaeb2;
  --accent:#e74c3c;--accent2:#c0392b;
  --accent-bg:rgba(231,76,60,.09);
  --accent-grad:linear-gradient(135deg,#ff6b5b,#e74c3c);
  --green:#34c759;--green-bg:rgba(52,199,89,.12);
  --sh-xs:0 1px 2px rgba(0,0,0,.06);
  --sh-sm:0 2px 8px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 20px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.05);
  --r:16px;--r-sm:10px;--ease:.22s cubic-bezier(.25,.46,.45,.94);
}
:root.dark{
  --bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--surface3:#3a3a3c;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#f5f5f7;--text2:#ebebf0;--text3:#8e8e93;--text4:#636366;
  --accent-bg:rgba(231,76,60,.15);--green-bg:rgba(52,199,89,.18);
  --sh-xs:0 1px 3px rgba(0,0,0,.4);
  --sh-sm:0 2px 10px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.3);
  --sh-md:0 4px 24px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3);
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:80px;
  transition:background var(--ease),color var(--ease);
}

/* HEADER */
.header{
  background:rgba(255,255,255,.82);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  padding:12px 16px;position:sticky;top:0;z-index:100;
  border-bottom:1px solid var(--border);
  transition:background var(--ease);
}
:root.dark .header{background:rgba(28,28,30,.85)}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.header-title{font-size:17px;font-weight:800;color:var(--accent);flex:1;letter-spacing:-.3px}
.icon-btn{
  width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
  background:var(--surface2);color:var(--text2);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--ease);box-shadow:var(--sh-xs);
  flex-shrink:0;
}
.icon-btn:active{transform:scale(.88)}
.progress-bar-wrap{background:var(--surface3);border-radius:999px;height:5px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent-grad);border-radius:999px;transition:width .5s cubic-bezier(.25,.46,.45,.94)}
.progress-text{font-size:11px;color:var(--text3);margin-top:4px;display:flex;justify-content:space-between;font-weight:500}

/* SCREEN */
.screen{padding:14px 14px 0}
.animate-in{animation:slideIn .28s cubic-bezier(.25,.46,.45,.94)}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* HOME */
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.section-sub{font-size:12px;color:var(--text3);font-weight:500}
.groups-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.group-card{
  background:var(--surface);border-radius:var(--r);
  padding:14px 12px 12px;cursor:pointer;
  transition:transform .12s,box-shadow .12s,background var(--ease);
  box-shadow:var(--sh-sm);border:1px solid var(--border);
  position:relative;overflow:hidden;user-select:none;
}
.group-card:active{transform:scale(.95)}
.group-card.done{border-color:rgba(52,199,89,.4)}
.group-card-bar{position:absolute;top:0;left:0;right:0;height:3px}
.group-card-icon{font-size:24px;margin-bottom:7px;display:block;line-height:1}
.group-card-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3;letter-spacing:-.1px}
.group-card-count{font-size:11px;color:var(--text3);font-weight:500}
.group-card-meta{display:flex;align-items:center;gap:5px;margin-top:5px}
.group-card-badge{font-size:11px;background:var(--green-bg);color:var(--green);border-radius:999px;padding:2px 7px;font-weight:700}
.group-card-kanji{font-size:10px;color:var(--text3);font-weight:600;background:var(--surface2);border-radius:999px;padding:2px 6px;border:1px solid var(--border)}

/* GROUP DETAIL */
.group-hd{
  background:var(--surface);border-radius:var(--r);
  padding:16px;margin-bottom:10px;
  box-shadow:var(--sh-sm);border:1px solid var(--border);
  display:flex;align-items:center;gap:14px;
}
.group-hd-icon{font-size:34px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:15px;flex-shrink:0}
.group-hd-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.group-hd-sub{font-size:12px;color:var(--text3);margin-top:2px;font-weight:500}
.group-hd-pills{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.pill.kanji-pill{color:var(--accent);background:var(--accent-bg);border-color:transparent}
.pill.done-pill{color:var(--green);background:var(--green-bg);border-color:transparent}

/* TIP */
.tip-card{
  background:rgba(255,193,7,.07);
  border:1px solid rgba(255,193,7,.2);
  border-radius:var(--r-sm);
  padding:12px 14px;margin-bottom:10px;
  font-size:13px;line-height:1.65;color:var(--text2);
}
:root.dark .tip-card{background:rgba(255,193,7,.05);border-color:rgba(255,193,7,.12)}
.tip-label{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;color:#f39c12;display:flex;align-items:center;gap:4px}

/* TABS */
.tabs{display:flex;background:var(--surface2);border-radius:var(--r-sm);padding:3px;margin-bottom:10px;border:1px solid var(--border)}
.tab{flex:1;padding:8px 4px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text3);transition:all var(--ease);border:none;background:none;font-family:inherit}
.tab.active{background:var(--surface);color:var(--accent);box-shadow:var(--sh-xs)}

/* FLASHCARDS */
.fc-stats{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:500}
.fc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fc{perspective:1000px;height:130px;cursor:pointer;user-select:none;position:relative}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.25,.46,.45,.94)}
.fc.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--r-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center}
.fc-front{background:var(--surface);box-shadow:var(--sh-sm);border:1px solid var(--border)}
.fc-back{transform:rotateY(180deg);color:#fff;box-shadow:var(--sh-md)}
.fc-kanji{font-size:25px;font-weight:800;line-height:1.2;color:var(--text)}
.fc-romaji{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
.fc-meaning{font-size:13px;font-weight:700;line-height:1.4}
.fc-romaji-back{font-size:10px;opacity:.8;margin-top:3px}
.fc-hint{font-size:10px;color:var(--text4);margin-top:6px}

/* KANJI DONE BUTTON */
.kanji-btn{
  position:absolute;top:6px;right:6px;
  width:26px;height:26px;border-radius:50%;
  border:1.5px solid var(--border2);
  background:var(--surface2);
  font-size:10px;font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);
  transition:all var(--ease);
  z-index:10;line-height:1;
  font-family:inherit;
}
.kanji-btn:active{transform:scale(.82)}
.kanji-btn.kdone{background:var(--green);border-color:var(--green);color:#fff;font-size:13px}

.fc-controls{margin-top:12px;display:flex;gap:8px;justify-content:center}

/* QUIZ */
.quiz-wrap{background:var(--surface);border-radius:var(--r);padding:18px;box-shadow:var(--sh-sm);border:1px solid var(--border)}
.quiz-meta{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;color:var(--text3);font-weight:600}
.quiz-mini-bar{background:var(--surface3);border-radius:999px;height:4px;overflow:hidden;margin-bottom:16px}
.quiz-mini-fill{height:100%;background:var(--accent-grad);border-radius:999px;transition:width .4s cubic-bezier(.25,.46,.45,.94)}
.quiz-word{font-size:42px;font-weight:800;text-align:center;margin-bottom:3px;line-height:1.1;color:var(--text)}
.quiz-romaji{font-size:13px;text-align:center;color:var(--text3);margin-bottom:18px;font-weight:500}
.quiz-prompt{font-size:11px;font-weight:700;text-align:center;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.6px}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.qc{
  padding:14px 10px;border:1.5px solid var(--border2);border-radius:var(--r-sm);
  cursor:pointer;font-size:13px;text-align:center;
  transition:all .15s;background:var(--surface2);
  font-family:inherit;color:var(--text);line-height:1.3;font-weight:500;
}
.qc:hover:not([disabled]){border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.qc.correct{border-color:var(--green)!important;background:var(--green-bg)!important;color:#1a7c2a!important}
:root.dark .qc.correct{color:var(--green)!important}
.qc.wrong{border-color:#ff453a!important;background:rgba(255,69,58,.08)!important;color:#c0392b!important}
:root.dark .qc.wrong{color:#ff453a!important}
.qc[disabled]{cursor:default}

/* RESULT */
.quiz-result{text-align:center;padding:12px 0}
.result-score{font-size:56px;font-weight:900;color:var(--accent);line-height:1;letter-spacing:-2px}
.result-pct{font-size:14px;color:var(--text3);margin:6px 0;font-weight:500}
.result-msg{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px}

/* FINAL BANNER */
.final-banner{background:var(--accent-grad);border-radius:var(--r);padding:22px;text-align:center;color:#fff;margin-bottom:16px;box-shadow:0 4px 20px rgba(231,76,60,.25)}
.final-banner h2{font-size:20px;font-weight:900;margin-bottom:6px;letter-spacing:-.3px}
.final-banner p{font-size:13px;opacity:.9}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:var(--r-sm);border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;transition:all var(--ease);user-select:none;letter-spacing:-.1px}
.btn-primary{background:var(--accent-grad);color:#fff;box-shadow:0 2px 12px rgba(231,76,60,.28)}
.btn-primary:active{transform:scale(.96);box-shadow:none}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
.btn-secondary:active{transform:scale(.96)}
.btn-block{width:100%}
.btn-row{display:flex;gap:9px;margin-top:14px}
.btn-row .btn{flex:1}
.btn-ghost{background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.5)}
.btn-ghost:active{background:rgba(255,255,255,.28)}
.back-btn{display:flex;align-items:center;gap:4px;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.back-btn:active{opacity:.65}

/* NAV BAR */
.nav-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:500px;
  background:rgba(255,255,255,.88);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border);
  display:flex;padding:10px 14px;gap:10px;z-index:100;
}
:root.dark .nav-bar{background:rgba(28,28,30,.88)}
.nav-bar .btn{flex:1}
</style>

      const saved = JSON.parse(d);
      if (saved.groupProgress) {
        state.groupProgress = saved.groupProgress;
        if (saved.view) state.view = saved.view;
        if (saved.currentGroup != null) state.currentGroup = saved.currentGroup;
        if (saved.tab) state.tab = saved.tab;
        if (Array.isArray(saved.kanjiDone)) state.kanjiDone = new Set(saved.kanjiDone);
        if (saved.darkMode) state.darkMode = true;
      } else {
        state.groupProgress = saved;
      }
    }
  } catch(e) {}
}
function saveProgress() {
  try {
    localStorage.setItem('jlpt_n5_v3', JSON.stringify({
      groupProgress: state.groupProgress,
      view: state.view,
      currentGroup: state.currentGroup,
      tab: state.tab,
      kanjiDone: [...state.kanjiDone],
      darkMode: state.darkMode,
    }));
  } catch(e) {}
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// QUIZ LOGIC
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getWrongAnswers(word, pool) {
  const others = pool.filter(w => w[2] !== word[2]);
  if (others.length >= 3) return shuffle(others).slice(0, 3);
  const allWords = GROUPS.flatMap(g => g.words);
  return shuffle(allWords.filter(w => w[2] !== word[2])).slice(0, 3);
}

function buildQ(word, gi) {
  const pool = GROUPS[gi].words;
  const wrongs = getWrongAnswers(word, pool);
  const choices = shuffle([word, ...wrongs]);
  return { word, choices, correctIdx: choices.indexOf(word), answered: null };
}

function buildQuestions(wordPool, count) {
  const picked = shuffle([...wordPool]).slice(0, count);
  const gi = GROUPS.findIndex(g => g.words.includes(picked[0]));
  return picked.map(word => {
    const wrongs = getWrongAnswers(word, wordPool);
    const choices = shuffle([word, ...wrongs]);
    return { word, choices, correctIdx: choices.indexOf(word), answered: null };
  });
}

// Mastery quiz: cycle until every word answered correctly
function generateQuiz(gi) {
  const words = GROUPS[gi].words;
  const roundQueue = shuffle(words.map((_,i) => i));
  return {
    groupIdx: gi, words,
    masteredIdx: new Set(),
    roundQueue, roundPos: 0, roundNum: 1,
    currentQ: buildQ(words[roundQueue[0]], gi),
    totalAsked: 0, totalCorrect: 0, done: false
  };
}

// Final quiz: 40 random questions from all groups
function generateFinalQuiz() {
  const all = GROUPS.flatMap(g => g.words);
  return { questions: buildQuestions(all, 40), current: 0, score: 0, done: false };
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// EVENTS
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let _autoTimer = null;
function scheduleAdvance(action) {
  clearTimeout(_autoTimer);
  _autoTimer = setTimeout(() => { handleClick({ currentTarget: { dataset: { action } } }); }, 1200);
}

function attachEvents() {
  document.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', handleClick));
}

function handleClick(e) {
  const a = e.currentTarget.dataset.action;
  if (a === 'open-group') {
    state.currentGroup = +e.currentTarget.dataset.idx;
    state.view = 'group'; state.tab = 'cards';
    state.flipped = new Set(); state.quizState = null;
    saveProgress(); render(); scrollTo(0,0);
  } else if (a === 'go-home') {
    state.view = 'home'; saveProgress(); render(); scrollTo(0,0);
  } else if (a === 'set-tab') {
    state.tab = e.currentTarget.dataset.tab; saveProgress(); render();
  } else if (a === 'toggle-dark') {
    state.darkMode = !state.darkMode;
    document.documentElement.classList.toggle('dark', state.darkMode);
    saveProgress(); render();
  } else if (a === 'toggle-kanji') {
    e.stopPropagation();
    const gi2 = +e.currentTarget.dataset.gi, wi2 = +e.currentTarget.dataset.wi;
    const kkey = `${gi2}-${wi2}`;
    state.kanjiDone.has(kkey) ? state.kanjiDone.delete(kkey) : state.kanjiDone.add(kkey);
    const isDoneNow = state.kanjiDone.has(kkey);
    e.currentTarget.classList.toggle('kdone', isDoneNow);
    e.currentTarget.textContent = isDoneNow ? 'вң“' : 'жјў';
    saveProgress();
    const g2 = GROUPS[gi2];
    const kc = g2.words.filter((_,i) => state.kanjiDone.has(`${gi2}-${i}`)).length;
    const kEl = document.querySelector('.kanji-count');
    if (kEl) kEl.textContent = `жјў ${kc}/${g2.words.length}`;
    const kPill = document.querySelector('.kanji-pill');
    if (kPill) kPill.textContent = `жјў ${kc}/${g2.words.length} studied`;
  } else if (a === 'flip') {
    const k = e.currentTarget.dataset.key;
    state.flipped.has(k) ? state.flipped.delete(k) : state.flipped.add(k);
    e.currentTarget.classList.toggle('flipped');
    const gi = state.currentGroup, g = GROUPS[gi];
    const cnt = g.words.filter((_,i) => state.flipped.has(`${gi}-${i}`)).length;
    const el = document.querySelector('.revealed-count');
    if (el) el.textContent = `${cnt}/${g.words.length} revealed`;
    const allF = cnt === g.words.length;
    const btn = document.querySelector('[data-action="flip-all"]');
    if (btn) btn.textContent = allF ? 'вҶә Reset' : 'рҹ‘Ғ Reveal All';
  } else if (a === 'flip-all') {
    const gi = state.currentGroup, g = GROUPS[gi];
    const allF = g.words.every((_,i) => state.flipped.has(`${gi}-${i}`));
    g.words.forEach((_,i) => allF ? state.flipped.delete(`${gi}-${i}`) : state.flipped.add(`${gi}-${i}`));
    render();
  } else if (a === 'start-quiz') {
    clearTimeout(_autoTimer); state.quizState = generateQuiz(state.currentGroup); render();
  } else if (a === 'retry-quiz') {
    clearTimeout(_autoTimer); state.quizState = null; render();
  } else if (a === 'answer') {
    const qs = state.quizState;
    if (!qs || qs.done) return;
    const q = qs.currentQ;
    if (q.answered !== null) return;
    const idx = +e.currentTarget.dataset.idx;
    q.answered = idx;
    qs.totalAsked++;
    if (idx === q.correctIdx) { qs.totalCorrect++; qs.masteredIdx.add(qs.roundQueue[qs.roundPos]); }
    render();
    scheduleAdvance('next-q');
  } else if (a === 'next-q') {
    clearTimeout(_autoTimer);
    const qs = state.quizState;
    qs.roundPos++;
    if (qs.roundPos >= qs.roundQueue.length) {
      const unmastered = qs.words.map((_,i) => i).filter(i => !qs.masteredIdx.has(i));
      if (unmastered.length === 0) {
        qs.done = true;
        state.groupProgress[state.currentGroup] = true; saveProgress();
      } else {
        qs.roundQueue = shuffle(unmastered);
        qs.roundPos = 0; qs.roundNum++;
        qs.currentQ = buildQ(qs.words[qs.roundQueue[0]], qs.groupIdx);
      }
    } else {
      qs.currentQ = buildQ(qs.words[qs.roundQueue[qs.roundPos]], qs.groupIdx);
    }
    render();
  } else if (a === 'prev-group') {
    if (state.currentGroup > 0) { state.currentGroup--; state.tab='cards'; state.flipped=new Set(); state.quizState=null; saveProgress(); render(); scrollTo(0,0); }
  } else if (a === 'next-group') {
    if (state.currentGroup < GROUPS.length-1) { state.currentGroup++; state.tab='cards'; state.flipped=new Set(); state.quizState=null; saveProgress(); render(); scrollTo(0,0); }
  } else if (a === 'open-final') {
    state.view = 'final'; state.finalQuiz = null; saveProgress(); render(); scrollTo(0,0);
  } else if (a === 'start-final-now') {
    state.finalQuiz = generateFinalQuiz(); render();
  } else if (a === 'answer-final') {
    const fq = state.finalQuiz;
    if (!fq || fq.done) return;
    const q = fq.questions[fq.current];
    if (q.answered !== null) return;
    const idx = +e.currentTarget.dataset.idx;
    q.answered = idx;
    if (idx === q.correctIdx) fq.score++;
    render();
    scheduleAdvance('next-final');
  } else if (a === 'next-final') {
    clearTimeout(_autoTimer);
    state.finalQuiz.current++;
    if (state.finalQuiz.current >= state.finalQuiz.questions.length) state.finalQuiz.done = true;
    render();
  } else if (a === 'restart-final') {
    state.finalQuiz = null; render();
  }
}

// INIT
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
loadProgress();
if (state.darkMode) document.documentElement.classList.add('dark');
render();
</script>
